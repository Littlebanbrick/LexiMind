services:
  backend:
    build: ./backend
    container_name: leximind-backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    environment:
      - FLASK_ENV=development
      # Bind to all interfaces inside the container so nginx (another container)
      # can reach the backend. The default (127.0.0.1) would only be reachable
      # from inside the backend container itself.
      - FLASK_HOST=0.0.0.0
    ports:
      - "5000:5000"

  nginx:
    image: nginx:alpine
    container_name: leximind-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend