services:
  backend:
    build: ./backend
    container_name: leximind-backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    environment:
      - FLASK_ENV=development
    ports:
      - "5000:5000"

  nginx:
    image: nginx:alpine
    container_name: leximind-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend